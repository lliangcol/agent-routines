name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  bash:
    name: Bash gates (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      # Pinned from actions/checkout@v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Set script permissions
        run: chmod +x ./tests/*.sh
      - name: validate-structure
        run: ./tests/validate-structure.sh
      - name: validate-skills
        run: ./tests/validate-skills.sh
      - name: validate-workflows
        run: ./tests/validate-workflows.sh
      - name: validate-docs
        run: ./tests/validate-docs.sh
      - name: validate-changelog
        run: ./tests/validate-changelog.sh
      - name: validate-manifest
        run: ./tests/validate-manifest.sh --manifest-path ./distribution/agent-routines.manifest.json
      - name: validate-install-discovery-config
        run: ./tests/validate-install-discovery-config.sh --config-path ./tools/install-discovery.config.example.json
      - name: run-workflows (smoke)
        run: ./tests/run-workflows.sh

  powershell:
    name: PowerShell gates (Windows)
    runs-on: windows-latest
    steps:
      # Pinned from actions/checkout@v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: validate-structure (pwsh)
        shell: pwsh
        run: ./tests/validate-structure.ps1
      - name: validate-skills (pwsh)
        shell: pwsh
        run: ./tests/validate-skills.ps1
      - name: validate-workflows (pwsh)
        shell: pwsh
        run: ./tests/validate-workflows.ps1
      - name: validate-docs (pwsh)
        shell: pwsh
        run: ./tests/validate-docs.ps1
      - name: validate-changelog (pwsh)
        shell: pwsh
        run: ./tests/validate-changelog.ps1
      - name: validate-manifest (pwsh)
        shell: pwsh
        run: ./tests/validate-manifest.ps1 -ManifestPath ./distribution/agent-routines.manifest.json
      - name: validate-install-discovery-config (pwsh)
        shell: pwsh
        run: ./tests/validate-install-discovery-config.ps1 -ConfigPath ./tools/install-discovery.config.example.json
      - name: run-workflows smoke (pwsh)
        shell: pwsh
        run: ./tests/run-workflows.ps1
      - name: validate-structure (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-structure.ps1
      - name: validate-skills (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-skills.ps1
      - name: validate-workflows (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-workflows.ps1
      - name: validate-docs (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-docs.ps1
      - name: validate-changelog (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-changelog.ps1
      - name: validate-manifest (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-manifest.ps1 -ManifestPath ./distribution/agent-routines.manifest.json
      - name: validate-install-discovery-config (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/validate-install-discovery-config.ps1 -ConfigPath ./tools/install-discovery.config.example.json
      - name: run-workflows smoke (Windows PowerShell 5.1)
        shell: powershell
        run: ./tests/run-workflows.ps1

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      # Pinned from actions/checkout@v4.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      # Pinned from gitleaks/gitleaks-action@v2.
      - uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
